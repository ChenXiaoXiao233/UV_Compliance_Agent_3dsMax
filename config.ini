[UV_AGENT]
; 目标贴图密度 (px/cm)
target_texel_density = 10.24

; UV岛间距百分比
spacing_percentage = 0.5

; 密度容忍度 (0-1)
density_tolerance = 0.15

; 自动修复
auto_fix_enabled = true

[LLM]
; 启用LLM分析 (需要API密钥)
enabled = true

; LLM提供商: xiaomimimo, openrouter, openai (自定义)
provider = xiaomimimo

; 小米MiMo API配置
xiaomimimo_api_key = 
xiaomimimo_base_url = https://api.xiaomimimo.com/v1
xiaomimimo_model = MiMo-7B-Instruct

; 可选：OpenRouter配置（作为备选）
openrouter_api_key = 
openrouter_base_url = https://openrouter.ai/api/v1
openrouter_model = xiaomimimo/mimo-7b-instruct

; 超时和重试配置
request_timeout = 60
max_retries = 3

[LOGGING]
level = INFO
file = uv_agent.log
