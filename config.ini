[UV_AGENT]
; 目标贴图密度 (px/cm)
target_texel_density = 10.24

; UV岛间距百分比
spacing_percentage = 0.5

; 密度容忍度 (0-1)
density_tolerance = 0.15

; 自动修复
auto_fix_enabled = true

[LLM]
; 启用LLM分析 (需要API密钥)
enabled = false

; LLM模型: gpt-3.5-turbo, gpt-4, claude-3-opus等
model = gpt-3.5-turbo

; API密钥 (也可通过环境变量OPENAI_API_KEY设置)
api_key = 

[LOGGING]
level = INFO
file = uv_agent.log